<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEEDI Container Module Catalog</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #f0f2f7;
  --glass-bg: rgba(255,255,255,0.72);
  --glass-bg-hover: rgba(255,255,255,0.88);
  --glass-border: rgba(255,255,255,0.55);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.03);
  --glass-shadow-hover: 0 16px 48px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
  --text: #1a1a1a;
  --text-secondary: #5c6370;
  --text-muted: #9499a3;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --accent-strong: #1d4ed8;
  --accent-glass: rgba(37,99,235,0.08);
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --font-display: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  --font-mono: 'DM Mono', 'SF Mono', 'Cascadia Code', monospace;
  --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --frost: rgba(255,255,255,0.45);
  --frost-border: rgba(255,255,255,0.7);
  --edit-active: #0d9488;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: var(--font-display);
  background: var(--bg-base);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  /* Subtle dot pattern */
  background-image: radial-gradient(rgba(37,99,235,0.06) 0.8px, transparent 0.8px);
  background-size: 24px 24px;
}

/* ========== GLASS HEADER ========== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--frost);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--frost-border);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 60px;
}

.logo-area { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo-img { height:30px; width:auto; }
.logo-text { font-weight:700; font-size:14px; color:var(--text); letter-spacing:-0.02em; white-space:nowrap; display:none; }

.header-divider { width:1px; height:22px; background:rgba(0,0,0,0.1); flex-shrink:0; }

.header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.search-area { width:260px; position:relative; flex-shrink:0; }
.search-input {
  width:100%; height:38px;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:19px;
  padding:0 42px 0 16px;
  font-family:var(--font-display);
  font-size:13px; color:var(--text);
  background:var(--glass-bg);
  backdrop-filter:blur(12px);
  outline:none;
  transition:all var(--transition);
}
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-glass); }
.search-input::placeholder { color:var(--text-muted); }
.search-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; }

.header-actions { display:flex; gap:7px; flex-shrink:0; }
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 16px; border-radius:19px;
  font-family:var(--font-display); font-size:13px; font-weight:500;
  cursor:pointer;
  border:1px solid rgba(0,0,0,0.08);
  background:var(--glass-bg);
  backdrop-filter:blur(12px);
  color:var(--text);
  transition:all var(--transition);
  white-space:nowrap;
}
.btn:hover { border-color:var(--accent); background:var(--glass-bg-hover); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,0.06); }
.btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-primary:hover { background:var(--accent-strong); border-color:var(--accent-strong); }

.btn-edit-active { background:var(--edit-active); color:#fff; border-color:var(--edit-active); }
.btn-edit-active:hover { background:#0f766e; border-color:#0f766e; }

/* ========== GLASS LAYOUT ========== */
.app-layout { display:flex; min-height:calc(100vh - 60px); }

/* ========== GLASS SIDEBAR ========== */
.sidebar {
  width:250px; flex-shrink:0;
  background:var(--frost);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-right:1px solid var(--frost-border);
  padding:18px 0;
  position:sticky; top:60px;
  height:calc(100vh - 60px);
  overflow-y:auto;
}
.sidebar-section { padding:0 16px; margin-bottom:16px; }
.sidebar-label {
  font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em;
  color:var(--text-muted); margin-bottom:6px; padding:0 8px;
}
.sidebar-list { list-style:none; }
.sidebar-item {
  display:flex; align-items:center; gap:9px;
  padding:7px 10px; border-radius:var(--radius-sm);
  font-size:12px; color:var(--text-secondary);
  cursor:pointer; transition:all 0.15s ease;
}
.sidebar-item:hover { background:var(--accent-glass); color:var(--accent); }
.sidebar-item.active { background:rgba(37,99,235,0.12); color:var(--accent); font-weight:600; }
.sidebar-item .item-icon {
  width:20px; height:20px; border-radius:5px;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700; flex-shrink:0;
  background:rgba(0,0,0,0.06); color:var(--text-secondary);
}
.sidebar-item.active .item-icon { background:rgba(37,99,235,0.2); color:var(--accent); }
.sidebar-count { margin-left:auto; font-size:10px; opacity:0.55; }

/* ========== MAIN ========== */
.main { flex:1; padding:24px 28px; overflow-y:auto; }
.stats-bar { display:flex; align-items:center; gap:16px; margin-bottom:20px; font-size:12px; color:var(--text-secondary); }
.stats-bar strong { color:var(--text); font-weight:600; }
.stats-pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 10px; border-radius:12px; font-size:11px; font-weight:500;
  background:var(--accent-glass); color:var(--accent);
  display:none;
}

/* ========== GLASS CARDS ========== */
.card-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:18px;
  padding-bottom:80px;
}

.card {
  background:var(--glass-bg);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);
  overflow:hidden;
  cursor:pointer;
  transition:all var(--transition-slow);
  position:relative;
  display:flex; flex-direction:column;
  box-shadow:var(--glass-shadow);
}

.card:hover {
  transform:translateY(-6px);
  box-shadow:var(--glass-shadow-hover);
  border-color:rgba(37,99,235,0.25);
  background:var(--glass-bg-hover);
}

/* Card image area */
.card-image {
  width:100%; height:140px;
  background:linear-gradient(135deg, #f0f3fa 0%, #e8ecf5 100%);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  position:relative;
  border-bottom:1px solid rgba(0,0,0,0.05);
}
.card-image img, .card-image svg { width:100%; height:100%; object-fit:cover; }
.card-image-placeholder {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-muted); font-size:40px; opacity:0.3;
}

/* Image controls */
.card-image-btns {
  position:absolute; top:8px; right:8px;
  display:flex; gap:5px; opacity:0;
  transition:opacity 0.2s ease;
}
.card:hover .card-image-btns { opacity:1; }
.card-img-btn {
  width:28px; height:28px; border-radius:50%;
  border:none; background:rgba(255,255,255,0.85);
  backdrop-filter:blur(8px);
  color:var(--text-secondary);
  font-size:12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s ease;
}
.card-img-btn:hover { background:#fff; color:var(--accent); }

/* Card body */
.card-body { padding:18px; display:flex; flex-direction:column; gap:10px; flex:1; }
.card-badge-row { display:flex; align-items:center; justify-content:space-between; }
.card-badge {
  display:inline-flex; padding:2px 9px; border-radius:8px;
  font-size:10px; font-weight:600; letter-spacing:0.03em;
  background:rgba(37,99,235,0.1); color:var(--accent);
}
.card-name { font-size:17px; font-weight:700; color:var(--text); letter-spacing:-0.01em; line-height:1.3; }
.card-code { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); }

/* FOUR CORE FIELDS */
.card-core {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 14px;
  margin-top:2px;
}
.card-core-item { display:flex; flex-direction:column; gap:1px; }
.card-core-label { font-size:10px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em; }
.card-core-value { font-size:13px; font-weight:600; color:var(--text); }

.card-footer {
  display:flex; align-items:center; justify-content:space-between;
  padding-top:8px; border-top:1px solid rgba(0,0,0,0.05);
}
.card-id { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
.card-app-badge {
  font-size:10px; font-weight:700; letter-spacing:0.04em;
  padding:2px 8px; border-radius:6px;
}

/* ========== GLASS MODAL ========== */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(15,23,42,0.35);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  z-index:200;
  display:flex; align-items:center; justify-content:center;
  opacity:0; visibility:hidden;
  transition:all 0.25s ease;
}
.modal-overlay.active { opacity:1; visibility:visible; }

.modal-panel {
  background:var(--glass-bg);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-xl);
  width:92%; max-width:720px; max-height:88vh;
  overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,0.12), 0 8px 32px rgba(0,0,0,0.06);
  animation:slideUp 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-header {
  position:sticky; top:0; z-index:1;
  background:var(--glass-bg);
  backdrop-filter:blur(20px);
  padding:22px 28px 16px;
  border-bottom:1px solid rgba(0,0,0,0.06);
  display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
}
.modal-title-group { display:flex; flex-direction:column; gap:3px; }
.modal-title { font-size:22px; font-weight:700; color:var(--text); letter-spacing:-0.02em; }
.modal-subtitle { font-family:var(--font-mono); font-size:12px; color:var(--text-muted); }
.modal-close {
  width:34px; height:34px; border-radius:50%;
  border:1px solid rgba(0,0,0,0.08);
  background:rgba(255,255,255,0.6);
  color:var(--text-secondary); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all var(--transition);
}
.modal-close:hover { background:#fff; color:var(--text); }

.modal-body { padding:20px 28px 24px; display:flex; flex-direction:column; gap:18px; }

/* Modal image */
.modal-image-area {
  width:100%; height:200px; border-radius:var(--radius);
  overflow:hidden; position:relative;
  background:linear-gradient(135deg, #f0f3fa, #e8ecf5);
  display:flex; align-items:center; justify-content:center;
}
.modal-image-area img, .modal-image-area svg { width:100%; height:100%; object-fit:cover; }
.modal-img-btns {
  position:absolute; top:10px; right:10px;
  display:flex; gap:6px;
}
.modal-img-btn {
  padding:5px 12px; border-radius:14px;
  border:1px solid rgba(0,0,0,0.1);
  background:rgba(255,255,255,0.8); backdrop-filter:blur(8px);
  font-size:11px; font-weight:500; cursor:pointer;
  color:var(--text-secondary);
  transition:all 0.15s ease;
}
.modal-img-btn:hover { background:#fff; color:var(--accent); }
.modal-img-btn.danger { color:#dc2626; }
.modal-img-btn.danger:hover { color:#b91c1c; background:rgba(220,38,38,0.06); }

.detail-section { display:flex; flex-direction:column; gap:4px; }
.detail-section-title {
  font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.07em;
  color:var(--text-muted); margin-bottom:4px;
}
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px 28px; }
.detail-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.04);
}
.detail-label { font-size:13px; color:var(--text-secondary); flex-shrink:0; }
.detail-value { font-family:var(--font-display); font-size:13px; font-weight:500; color:var(--text); text-align:right; font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }
.detail-value-strong { font-family:var(--font-display); font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }

/* ========== EDITING MODE ========== */
.detail-value input, .detail-value select {
  font-family:var(--font-display); font-size:13px;
  border:1px solid rgba(0,0,0,0.1); border-radius:6px;
  padding:4px 8px; text-align:right; width:140px;
  background:rgba(255,255,255,0.7);
  outline:none;
}
.detail-value input:focus, .detail-value select:focus {
  border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glass);
}
.edit-indicator {
  display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--accent); margin-left:6px;
  animation:pulse 1.5s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Global edit mode banner */
.edit-mode-banner {
  background: var(--edit-active);
  color: #fff;
  text-align: center;
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.03em;
  display: none;
}
.edit-mode-banner.active { display: block; }

.modal-footer {
  padding:14px 28px; border-top:1px solid rgba(0,0,0,0.06);
  display:flex; justify-content:flex-end; gap:8px;
  position:sticky; bottom:0;
  background:var(--glass-bg); backdrop-filter:blur(20px);
}

/* Toast */
.toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  background:rgba(26,26,26,0.9); backdrop-filter:blur(12px);
  color:#fff; padding:10px 22px; border-radius:20px;
  font-size:13px; font-weight:500; z-index:300;
  opacity:0; visibility:hidden; transition:all 0.3s ease;
}
.toast.show { opacity:1; visibility:visible; }

/* No results */
.no-results { grid-column:1/-1; text-align:center; padding:60px 20px; }
.no-results-icon { font-size:44px; margin-bottom:10px; opacity:0.35; }
.no-results-text { font-size:15px; font-weight:500; color:var(--text-secondary); }

/* Animations */
.card { animation:cardIn 0.5s ease backwards; }
@keyframes cardIn { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.2)}

/* ========== IMAGE LIGHTBOX ========== */
.lightbox-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 400;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: all 0.25s ease;
  cursor: zoom-out;
}
.lightbox-overlay.active { opacity: 1; visibility: visible; }

.lightbox-container {
  position: relative;
  max-width: 92vw; max-height: 92vh;
  display: flex; align-items: center; justify-content: center;
}
.lightbox-container img {
  max-width: 90vw; max-height: 90vh;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.3);
  animation: lightboxIn 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes lightboxIn { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }

.lightbox-close {
  position: absolute; top: -40px; right: 0;
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.12);
  color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
}
.lightbox-close:hover { background: rgba(255,255,255,0.25); }

/* Responsive */
@media(max-width:1100px){.card-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}}
@media(max-width:800px){.sidebar{display:none}.main{padding:16px 14px}.header{padding:0 12px}.card-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}}
@media(max-width:500px){.card-grid{grid-template-columns:1fr}.header-actions .btn span{display:none}.modal-panel{width:96%}.detail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- EDIT MODE BANNER -->
<div class="edit-mode-banner" id="editModeBanner">&#9998; 编辑模式已开启 &mdash; 现在可以修改数据、更换图片</div>

<!-- HEADER -->
<header class="header">
  <div class="logo-area">
    <img class="logo-img" src="https://www.ceedi.com.cn/gtdzyn/lib/template/scheme/images/logo.png?v=1.1" alt="CEEDI" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
    <span class="logo-text">CEEDI</span>
  </div>
  <div class="header-divider"></div>
  <div class="header-right">
    <div class="search-area">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索型号 / 编码 / 应用..." autocomplete="off">
      <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="handleNew()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>新增</span>
      </button>
      <button id="editModeBtn" class="btn" onclick="toggleEditMode()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>编辑</span>
      </button>
      <button class="btn" onclick="handleExport()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        <span>导出</span>
      </button>
    </div>
  </div>
</header>

<!-- LAYOUT -->
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section"><div class="sidebar-label">型号名称</div><ul class="sidebar-list" id="sidebarNameList"></ul></div>
    <div class="sidebar-section"><div class="sidebar-label">应用类别</div><ul class="sidebar-list" id="sidebarAppList"></ul></div>
  </aside>
  <main class="main">
    <div class="stats-bar">
      <span>总计 <strong id="totalCount">0</strong> 条记录</span>
      <span class="stats-pill" id="filteredPill"></span>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-panel" id="modalPanel"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- IMAGE LIGHTBOX -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
  <div class="lightbox-container">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="">
  </div>
</div>

<!-- Hidden file input for image upload -->
<input type="file" id="imageFileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">

// Load PRODUCT_DATA from localStorage, fall back to defaults
function loadProductData() {
  try {
    const saved = localStorage.getItem('ceedi_product_data');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_PRODUCT_DATA));
}

function saveProductData() {
  try {
    localStorage.setItem('ceedi_product_data', JSON.stringify(PRODUCT_DATA));
  } catch(e) {}
}

const PRODUCT_DATA = loadProductData();

// IMAGE_STORE - kept for custom uploads
const IMAGE_STORE = {};

const APP_COLORS = { IT:'#2563eb',FWU:'#059669',UPS:'#dc2626',FIRE:'#ea580c',PDM:'#7c3aed',HAVC:'#0891b2',GEN:'#4b5563',HVC:'#0d9488',BMS:'#8b5cf6',EMS:'#10b981',SEC:'#6b7280' };

let currentFilter = { search:'', vendor:'', name:'', app:'' };
let currentSort = 'id-asc';
let isEditing = false;
let editingProductId = null;
let tempEditData = null;
let pendingImageTarget = null;
let globalEditMode = false; // controlled by the "Edit" button in header

// ============================================================
// UTILS
// ============================================================
function si(v) { return v === null || v === undefined || v === '' ? '' : String(v); }
function getAppColor(app) { return APP_COLORS[app] || '#4b5563'; }

function getFilteredData() {
  let data = [...PRODUCT_DATA];
  const q = currentFilter.search;
  if (q) data = data.filter(r => r.code.toLowerCase().includes(q.toLowerCase()) || r.name.includes(q) || r.app.toLowerCase().includes(q.toLowerCase()));
  if (currentFilter.name) data = data.filter(r => r.name === currentFilter.name);
  if (currentFilter.app) data = data.filter(r => r.app === currentFilter.app);
  return data;
}

function getSortedData(data) {
  switch(currentSort) {
    case 'id-asc': return data.sort((a,b)=>a.id-b.id);
    case 'id-desc': return data.sort((a,b)=>b.id-a.id);
    case 'vendor-asc': return data.sort((a,b)=>a.vendor.localeCompare(b.vendor,'zh'));
    case 'area-desc': return data.sort((a,b)=>b.area-a.area);
    case 'area-asc': return data.sort((a,b)=>a.area-b.area);
    default: return data;
  }
}

// ============================================================
// GLOBAL EDIT MODE TOGGLE
// ============================================================
function toggleEditMode() {
  globalEditMode = !globalEditMode;
  const btn = document.getElementById('editModeBtn');
  const banner = document.getElementById('editModeBanner');
  if (globalEditMode) {
    btn.classList.add('btn-edit-active');
    banner.classList.add('active');
    showToast('编辑模式已开启 &mdash; 现在可以修改数据和图片');
  } else {
    btn.classList.remove('btn-edit-active');
    banner.classList.remove('active');
    // close any open editing states
    if (isEditing) { cancelEdit(); }
    // refresh modal if open
    if (document.getElementById('modalOverlay').classList.contains('active')) {
      const r = PRODUCT_DATA.find(p => p.id === editingProductId);
      if (r) buildModal(r);
    }
    showToast('编辑模式已关闭 &mdash; 只读状态');
  }
  renderCards();
}

// ============================================================
// RENDER CARDS
// ============================================================
function renderCards() {
  let data = getFilteredData();
  data = getSortedData(data);
  const grid = document.getElementById('cardGrid');
  document.getElementById('totalCount').textContent = data.length;

  const pill = document.getElementById('filteredPill');
  const parts = [];
  if (currentFilter.search) parts.push('搜索: '+currentFilter.search);
  if (currentFilter.vendor) parts.push(currentFilter.vendor);
  if (currentFilter.name) parts.push(currentFilter.name);
  if (currentFilter.app) parts.push(currentFilter.app);
  pill.textContent = parts.length ? '筛选: '+parts.join(' · ') : '';
  pill.style.display = parts.length ? '' : 'none';

  if (!data.length) {
    grid.innerHTML = '<div class="no-results"><div class="no-results-icon">\u{1F4ED}</div><div class="no-results-text">无匹配记录</div></div>';
    renderSidebar();
    return;
  }

  grid.innerHTML = data.map((r,i) => {
    const imgHtml = `<img src="A.jpg" alt="${r.code}" loading="lazy" onerror="this.style.display='none';this.parentElement.querySelector('.card-image-placeholder').style.display='flex';"><div class="card-image-placeholder" style="display:none;">\u{1F4E6}</div>`;
    const imageBtns = globalEditMode
      ? `<div class="card-image-btns" onclick="event.stopPropagation()">
          <button class="card-img-btn" title="更换图片" onclick="event.stopPropagation();triggerImageChange(${r.id}, event)">\u{1F5BC}</button>
        </div>`
      : '';
    return `
    <div class="card" style="animation-delay:${i*0.04}s" onclick="openDetail(${r.id})" title="点击查看详情 | 编号 #${r.id}">
      <div class="card-image" ${globalEditMode ? `onclick="event.stopPropagation();triggerImageChange(${r.id}, event)"` : ''}>
        ${imgHtml}
        ${imageBtns}
      </div>
      <div class="card-body">
        <div class="card-badge-row">
          <span class="card-badge" style="background:${getAppColor(r.app)}15;color:${getAppColor(r.app)}">${si(r.app)}</span>
        </div>
        <div class="card-name">${si(r.name)}</div>
        <div class="card-core">
          <div class="card-core-item">
            <span class="card-core-label">编码</span>
            <span class="card-core-value">${si(r.code)}</span>
          </div>
          <div class="card-core-item">
            <span class="card-core-label">尺寸</span>
            <span class="card-core-value">${r.width}×${r.length}×${si(r.height)}mm</span>
          </div>
          <div class="card-core-item">
            <span class="card-core-label">面积</span>
            <span class="card-core-value">${r.area} m²</span>
          </div>
          <div class="card-core-item">
            <span class="card-core-label">楼层</span>
            <span class="card-core-value">${si(r.floorLvl)}</span>
          </div>
        </div>
        <div class="card-footer">
          <span class="card-id">#${r.id}</span>
          <span class="card-app-badge" style="background:${getAppColor(r.app)}15;color:${getAppColor(r.app)}">${si(r.app)}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  renderSidebar();
}

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar() {
  const data = getFilteredData();
  const nameMap={}, appMap={};
  data.forEach(r => { nameMap[r.name]=(nameMap[r.name]||0)+1; appMap[r.app]=(appMap[r.app]||0)+1; });

  const mk = (items, listId, key, cur) => {
    const ul = document.getElementById(listId);
    const sorted = Object.entries(items).sort((a,b) => a[0].localeCompare(b[0],'zh'));
    ul.innerHTML = sorted.map(([k,c]) => {
      const act = cur===k?' active':'';
      return `<li class="sidebar-item${act}" onclick="event.stopPropagation();setFilter('${key}','${k.replace(/'/g,"\\'")}')"><span class="item-icon">${k.charAt(0)}</span><span>${k}</span><span class="sidebar-count">${c}</span></li>`;
    }).join('');
    ul.insertAdjacentHTML('afterbegin',`<li class="sidebar-item${!cur?' active':''}" onclick="event.stopPropagation();setFilter('${key}','')"><span class="item-icon">★</span><span>全部</span></li>`);
  };

  mk(nameMap,'sidebarNameList','name',currentFilter.name);
  mk(appMap,'sidebarAppList','app',currentFilter.app);
}

function setFilter(key,val) {
  currentFilter[key]=val;
  if(key==='name'){currentFilter.app='';}
  renderCards();
}

// ============================================================
// DETAIL MODAL
// ============================================================
function openDetail(id) {
  const r = PRODUCT_DATA.find(p => p.id === id);
  if (!r) return;
  isEditing = false;
  editingProductId = id;
  tempEditData = JSON.parse(JSON.stringify(r));

  buildModal(r);
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function buildModal(r) {
  const imgHtml = `<img src="A.jpg" alt="${r.code}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div style="font-size:48px;opacity:0.25;display:none;">\u{1F4E6}</div>`;

  const p = document.getElementById('modalPanel');
  const d = isEditing ? tempEditData : r;

  // Image controls only visible when BOTH globalEditMode AND isEditing are true
  const imgBtns = (globalEditMode && isEditing)
    ? `<div class="modal-img-btns">
        <button class="modal-img-btn" onclick="event.stopPropagation();triggerImageChange(${r.id})">\u{1F5BC} 更换</button>
        <button class="modal-img-btn danger" onclick="event.stopPropagation();deleteImage(${r.id})">\u{1F5D1} 移除</button>
      </div>`
    : '';

  // Header edit button only visible in globalEditMode
  const headerEditBtn = globalEditMode
    ? (isEditing
      ? `<button class="modal-img-btn" onclick="saveEdit()" style="color:#059669">✔ 保存</button><button class="modal-img-btn danger" onclick="cancelEdit()">✕ 取消</button>`
      : `<button class="modal-img-btn" onclick="startEditing()">✎ 编辑</button>`)
    : '';

  p.innerHTML = `
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-title">${si(r.name)} ${isEditing?'<span class="edit-indicator"></span>':''}${headerEditBtn}</div>
        <div class="modal-subtitle">${si(r.code)}</div>
      </div>
      <button class="modal-close" onclick="closeModal()" title="关闭 (ESC)">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-image-area" onclick="openLightbox('A.jpg')" style="cursor:zoom-in;" title="点击放大">
        ${imgHtml}
        ${imgBtns}
      </div>

      <div class="detail-section">
        <div class="detail-section-title">基本信息</div>
        <div class="detail-grid">
          ${fieldRow('ID',r.id,false)}
          ${fieldRow('型号',r.name,'name')}
          ${fieldRow('编码',r.code,'code')}
          ${fieldRow('应用',r.app,'app')}
          ${fieldRow('楼层',r.floorLvl,'floorLvl')}
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">尺寸信息</div>
        <div class="detail-grid">
          ${fieldRow('宽度',r.width+' mm','width')}
          ${fieldRow('长度',r.length+' mm','length')}
          ${fieldRow('高度',(r.height||'—')+' mm','height')}
          ${fieldRow('面积',r.area+' m²','area')}
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">结构构件</div>
        <div class="detail-grid">
          ${fieldRow('立柱',r.column||'—','column')}
          ${fieldRow('立柱2',r.column2||'—','column2')}
          ${fieldRow('顶梁1',r.top1||'—','top1')}
          ${fieldRow('顶梁2',r.top2||'—','top2')}
          ${fieldRow('顶次梁',r.tops||'—','tops')}
          ${fieldRow('底梁1',r.bottom1||'—','bottom1')}
          ${fieldRow('底梁2',r.bottom2||'—','bottom2')}
          ${fieldRow('底次梁',r.bottoms||'—','bottoms')}
          ${fieldRow('底板材质',r.floor||'—','floor')}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      ${globalEditMode
        ? (isEditing
          ? `<button class="btn" onclick="cancelEdit()">取消</button><button class="btn" style="color:#dc2626;border-color:rgba(220,38,38,0.3)" onclick="deleteProduct(${r.id})">删除</button><button class="btn btn-primary" onclick="saveEdit()">保存更改</button>`
          : `<button class="btn" style="color:#dc2626;border-color:rgba(220,38,38,0.3)" onclick="deleteProduct(${r.id})">删除</button><button class="btn" onclick="startEditing()">✎ 编辑</button><button class="btn" onclick="closeModal()">关闭</button>`)
        : `<button class="btn" style="color:#dc2626;border-color:rgba(220,38,38,0.3)" onclick="deleteProduct(${r.id})">删除</button><button class="btn" onclick="closeModal()">关闭</button>`}
    </div>
  `;
}

function fieldRow(label,value,key) {
  if (!key) return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value detail-value-strong">${si(value)}</span></div>`;
  if (isEditing && globalEditMode) {
    const v = si(tempEditData[key] !== undefined ? tempEditData[key] : value);
    const isNum = ['width','length','height','area'].includes(key);
    return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value"><input type="${isNum?'number':'text'}" value="${v.replace(/"/g,'&quot;')}" data-key="${key}" onchange="onFieldChange(this)" ${isNum?'step="any"':''}></span></div>`;
  }
  const v = si(value);
  return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${v}</span></div>`;
}

function onFieldChange(el) {
  const key = el.dataset.key;
  let val = el.value;
  if (['width','length','height','area'].includes(key)) val = parseFloat(val) || val;
  tempEditData[key] = val;
}

function startEditing() {
  if (!globalEditMode) { showToast('请先点击顶部编辑按钮开启编辑模式'); return; }
  isEditing = true;
  const r = PRODUCT_DATA.find(p => p.id === editingProductId);
  if (r) {
    tempEditData = JSON.parse(JSON.stringify(r));
    buildModal(r);
  }
}

function saveEdit() {
  const idx = PRODUCT_DATA.findIndex(p => p.id === editingProductId);
  if (idx === -1) return;
  PRODUCT_DATA[idx] = JSON.parse(JSON.stringify(tempEditData));
  saveProductData();
  isEditing = false;
  const r = PRODUCT_DATA[idx];
  buildModal(r);
  renderCards();
  showToast('已保存 #' + editingProductId + ' 的更改');
}

function cancelEdit() {
  isEditing = false;
  tempEditData = null;
  const r = PRODUCT_DATA.find(p => p.id === editingProductId);
  if (r) buildModal(r);
}

function closeModal() {
  if (isEditing) { cancelEdit(); }
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function deleteProduct(id) {
  if (!globalEditMode) { showToast('请先开启编辑模式'); return; }
  if (!confirm('确认删除 #' + id + ' 这条记录吗？此操作不可撤销。')) return;
  const idx = PRODUCT_DATA.findIndex(p => p.id === id);
  if (idx === -1) return;
  PRODUCT_DATA.splice(idx, 1);
  saveProductData();
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
  isEditing = false;
  tempEditData = null;
  renderCards();
  showToast('已删除 #' + id);
}

// ============================================================
// IMAGE MANAGEMENT
// ============================================================
function triggerImageChange(productId, event) {
  if (!globalEditMode) { showToast('请先开启编辑模式'); return; }
  pendingImageTarget = productId;
  document.getElementById('imageFileInput').click();
}

function handleImageUpload(event) {
  if (!globalEditMode) { showToast('请先开启编辑模式'); return; }
  const file = event.target.files[0];
  if (!file || !pendingImageTarget) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const key = String(pendingImageTarget);
    IMAGE_STORE[key] = [e.target.result];
    try {
      localStorage.setItem('ceedi_images', JSON.stringify(IMAGE_STORE));
    } catch(er) {}
    showToast('图片已更新 #' + pendingImageTarget);
    renderCards();
    if (document.getElementById('modalOverlay').classList.contains('active')) {
      const r = PRODUCT_DATA.find(p => p.id === editingProductId);
      if (r) buildModal(r);
    }
    pendingImageTarget = null;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function deleteImage(productId) {
  if (!globalEditMode) { showToast('请先开启编辑模式'); return; }
  IMAGE_STORE[String(productId)] = [];
  try { localStorage.setItem('ceedi_images', JSON.stringify(IMAGE_STORE)); } catch(er) {}
  showToast('图片已删除 #' + productId);
  renderCards();
  const r = PRODUCT_DATA.find(p => p.id === editingProductId);
  if (r && document.getElementById('modalOverlay').classList.contains('active')) buildModal(r);
}

// Load saved images from localStorage
function loadSavedImages() {
  try {
    const saved = JSON.parse(localStorage.getItem('ceedi_images'));
    if (saved) Object.assign(IMAGE_STORE, saved);
  } catch(er) {}
}
loadSavedImages();

// ============================================================
// BUTTON HANDLERS
// ============================================================
function handleNew() {
  if (!globalEditMode) { showToast('请先点击顶部编辑按钮开启编辑模式'); return; }
  const maxId = Math.max(...PRODUCT_DATA.map(p=>p.id), 0);
  const newRec = {
    id: maxId + 1, vendor:'新供应商', name:'XX', code:'DC-XX-00GP-NEW',
    width:0, length:0, height:0, area:0, app:'NEW',
    column:'', column2:'', top1:'', top2:'', tops:'',
    bottom1:'', bottom2:'', bottoms:'', floor:'', floorLvl:''
  };
  PRODUCT_DATA.push(newRec);
  saveProductData();
  renderCards();
  openDetail(newRec.id);
  setTimeout(() => startEditing(), 300);
  showToast('已新增 #' + newRec.id + ' 条记录 &mdash; 请编辑');
}

function handleExport() {
  const data = getFilteredData();
  const keys = Object.keys(PRODUCT_DATA[0]);
  const csv = [keys.join(','),
    ...data.map(r => keys.map(k => { const v=r[k]; return v===null||v===undefined?'':'"'+String(v).replace(/"/g,'""')+'"'; }).join(','))
  ].join('\n');
  const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'container_modules_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(a.href);
  showToast('已导出 ' + data.length + ' 条记录');
}

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(m) {
  const t = document.getElementById('toast');
  t.innerHTML = m; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ============================================================
// EVENTS
// ============================================================
document.getElementById('searchInput').addEventListener('input', function(e){
  currentFilter.search = e.target.value.trim();
  currentFilter.name=''; currentFilter.app='';
  renderCards();
});
document.addEventListener('keydown', function(e){
  if (e.key==='Escape') {
    if (document.getElementById('lightboxOverlay').classList.contains('active')) {
      closeLightbox();
    } else {
      closeModal();
    }
  }
});

// ============================================================
// LIGHTBOX
// ============================================================
function openLightbox(src) {
  const overlay = document.getElementById('lightboxOverlay');
  const img = document.getElementById('lightboxImg');
  img.src = src;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const overlay = document.getElementById('lightboxOverlay');
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

// ============================================================
// INIT
// ============================================================
renderCards();
</script>
